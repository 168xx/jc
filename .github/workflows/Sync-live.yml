name: Sync live.txt from cj Repo  
  
on:  
  schedule:  
    - cron: '0 */6 * * *'  # 每6小时运行一次  
  
jobs:  
  sync-live-txt:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout current repository  
        uses: actions/checkout@v2  
  
      - name: Set up Git  
        run: |  
          git config --global url."https://${GITHUB_ACTOR}:${PRIVATE_REPO_PAT}@github.com/".insteadOf "https://github.com/"  
        env:  
          PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT }}  
  
      # 添加步骤以克隆或同步源仓库的 live.txt 文件  
      - name: Clone source repository and sync live.txt  
        run: |  
          # 克隆源仓库（假设源仓库为 cj/source-repo）  
          git clone https://${GITHUB_ACTOR}:${PRIVATE_REPO_PAT}@github.com/cj/source-repo.git source-repo  
            
          # 切换到当前仓库的工作目录  
          cd ${GITHUB_WORKSPACE}  
            
          # 复制 live.txt 文件到当前仓库  
          cp IP/live.txt .  
            
          # 添加更改到暂存区  
          git add live.txt  
            
          # 提交更改（如果有的话），并推送到当前仓库  
          if [ -n "$(git status --porcelain)" ]; then  
            git commit -m "Automated sync of live.txt from cj/source-repo"  
            git push  
          fi  
        env:  
          PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT }}  