name: Sync live.txt from cj Repo  
  
on:  
  schedule:  
    - cron: '0 */6 * * *'  # 每6小时运行一次  
    workflow_dispatch:
    分支:
      - main    

jobs:  
  sync-live-txt:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout current repository  
        uses: actions/checkout@v2  
  
      - name: Set up Git  
        run: |  
          git config --global url."https://${GITHUB_ACTOR}:${PRIVATE_REPO_PAT}@github.com/".insteadOf "https://github.com/"  
        env:  
          PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT }}  
  
      - name: Clone specific file from private repository  
        run: |  
          # 使用 sparse-checkout 克隆特定文件  
          git init cj-repo-clone  
          cd cj-repo-clone  
          git remote add origin https://github.com/168xx/cj.git  
          git config core.sparseCheckout true  
          echo "tv/live.txt" >> .git/info/sparse-checkout  
          git pull origin main --depth=1  # 假设文件在 main 分支上，且深度为1足以获取文件  
        env:  
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}   
      # 注意：上面的步骤中，我们实际上没有使用GITHUB_TOKEN来克隆仓库，因为我们已经通过全局Git配置设置了PAT。  
      # 如果GitHub Actions环境变量中的GITHUB_TOKEN导致混淆，可以简单地移除或重命名该环境变量声明。  
  
      - name: Copy live.txt to IP folder  
        run: |  
          mkdir -p IP  
          cp cj-repo-clone/tv/live.txt IP/  
  
      - name: Commit and push changes  
        run: |  
          git add IP/live.txt  
          git config --local user.email "action@github.com"  
          git config --local user.name "GitHub Action"  
          # 检查是否有更改要提交  
          if [ -n "$(git status --porcelain)" ]; then  
            git commit -m "Sync live.txt from cj repo"  
            git push  
          fi