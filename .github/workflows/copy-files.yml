name: Copy Files from Private Repo  
  
on:  
  workflow_dispatch:  # 手动触发，或者根据需要设置为其他事件，如定时触发  
  
jobs:  
  copy-files:  
    runs-on: ubuntu-latest  
    permissions:  
      contents: 'write'  # 允许写入当前仓库的内容  
      repositories: 'read'  # 允许读取其他仓库的内容（需要额外的配置）  
  
    steps:  
      - name: Checkout current repository  
        uses: actions/checkout@v2  
  
      - name: Set up Git  
        run: |  
          git config --global user.name 'github-actions'  
          git config --global user.email 'github-actions@github.com'  
  
      - name: Clone private repository  
        env:  
          PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT }}  # 在仓库的 Settings > Secrets 中添加此个人访问令牌  
        run: |  
          git clone https://${PRIVATE_REPO_PAT}:@github.com/168xx/zdgx.git private-repo  
  
      - name: Copy txt and m3u files to live folder  
        run: |  
          mkdir -p live  
          cp -r private-repo/tv/*.txt private-repo/tv/*.m3u live/  
  
      - name: Commit and push changes  
        run: |  
          git add live  
          if [ -n "$(git status --porcelain)" ]; then  
              git commit -m "Copied txt and m3u files from private repo"  
              git push  
          fi