name: Copy Files from Private Repo  
  
on:  
  workflow_dispatch:  # 手动触发  
  
jobs:  
  copy-files:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout current repository  
        uses: actions/checkout@v2  
        with:  
          fetch-depth: 0  # 获取所有历史记录  
  
      - name: Set up Git user info  
        run: |  
          git config --global user.name 'github-actions-bot'  
          git config --global user.email 'github-actions-bot@github.com'  
  
      - name: Add private repository SSH key  
        run: |  
          mkdir -p ~/.ssh  
          echo "${{ secrets.PRIVATE_REPO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa  
          chmod 600 ~/.ssh/id_rsa  
          ssh-keyscan github.com >> ~/.ssh/known_hosts  
        env:  
          PRIVATE_REPO_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_REPO_SSH_PRIVATE_KEY }}  
  
      - name: Clone private repository  
        run: |  
          git clone git@github.com:168xx/zdgx.git ./private-repo  
  
      - name: Copy files to live folder  
        run: |  
          cp ./private-repo/tv/*.txt ./private-repo/tv/*.m3u ./live/  
  
      - name: Stage changes  
        run: |  
          git add live/  
  
      - name: Commit changes  
        run: |  
          if [ -n "$(git status --porcelain)" ]; then  
            git commit -m "Copied .txt and .m3u files from private repository to live folder"  
          else  
            echo "No changes to commit"  
          fi  
  
      - name: Push changes  
        run: |  
          git push  
        env:  
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
  
secrets:  
  PRIVATE_REPO_SSH_PRIVATE_KEY:  
    description: 'Private SSH key to clone the private repository'  
    required: true