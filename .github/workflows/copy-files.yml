name: Copy Files from Private Repo  
  
on:  
  workflow_dispatch:  # 手动触发工作流  
  
jobs:  
  copy-files:  
    runs-on: ubuntu-latest  
  
    env:  
      PRIVATE_REPO_URL: github.com/168xx/zdgx.git  # 私有仓库的 URL  
      PRIVATE_REPO_BRANCH: zdgx  # 私有仓库的分支名  
      SOURCE_FOLDER: tv  # 源文件夹  
      TARGET_FOLDER: live  # 目标文件夹  
      GITHUB_TOKEN: ${{ secrets.YOUR_PERSONAL_ACCESS_TOKEN }}  # 你的个人访问令牌，需要具有对私有仓库的读取权限和对当前仓库的写入权限  
  
    steps:  
    - name: Checkout current repo  
      uses: actions/checkout@v3  
  
    - name: Clone private repo  
      run: |  
        git clone https://x-access-token:${GITHUB_TOKEN}@${PRIVATE_REPO_URL} private-repo  
        cd private-repo  
        git checkout ${PRIVATE_REPO_BRANCH}  
  
    - name: Copy files  
      run: |  
        cp -r private-repo/${SOURCE_FOLDER}/*.{txt,m3u} ${GITHUB_WORKSPACE}/${TARGET_FOLDER}/  
  

     - name: Commit and push changes  
       run: |  
         git config --global user.name 'github-actions'  
         git config --global user.email 'github-actions@github.com'  
         git add ${TARGET_FOLDER}/  
         git commit -m "Copied files from private repo"  
         git push origin HEAD:${YOUR_BRANCH_NAME}  
  
    # 清理工作目录  
    - name: Cleanup  
      if: always()  
      run: rm -rf private-repo