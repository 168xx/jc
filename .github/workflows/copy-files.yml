name: Copy Files from Private Repo  
  
on:  
  workflow_dispatch:  # 手动触发，或者根据需要设置其他触发事件，如 schedule  
  
jobs:  
  copy-files:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout current repository  
        uses: actions/checkout@v2  
        with:  
          persist-credentials: false  
          fetch-depth: 0  # 获取所有历史记录以便我们可以推送更改  
  
      - name: Set up Git  
        run: |  
          git config --global user.name 'github-actions'  
          git config --global user.email 'github-actions@github.com'  
  
      - name: Install SSH key for private repository access  
        run: |  
          mkdir -p ~/.ssh  
          echo "${{ secrets.PRIVATE_REPO_SSH_KEY }}" > ~/.ssh/id_rsa  
          chmod 600 ~/.ssh/id_rsa  
          ssh-keyscan github.com >> ~/.ssh/known_hosts  
        env:  
          PRIVATE_REPO_SSH_KEY: ${{ secrets.PRIVATE_REPO_SSH_PRIVATE_KEY }}  
  
      - name: Clone private repository  
        run: |  
          git clone git@github.com:168xx/zdgx.git private-repo  
  
      - name: Copy .txt and .m3u files to live folder  
        run: |  
          cp -r private-repo/tv/*.txt private-repo/tv/*.m3u ./live/  
  
      - name: Commit and push changes  
        run: |  
          git add live/  
          if [ -n "$(git status --porcelain)" ]; then  
            git commit -m "Copied .txt and .m3u files from private repository"  
            git push  
          else  
            echo "No changes to commit"  
          fi  
        env:  
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 确保这个 token 有对当前仓库的写权限  
  
secrets:  
  PRIVATE_REPO_SSH_PRIVATE_KEY:  
    description: 'Private SSH key to access the private repository'  
    required: true