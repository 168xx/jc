name: Copy Files from Private Repo to Live Folder  
  
on:  
  workflow_dispatch:  
  
jobs:  
  copy-and-commit:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout current repository  
        uses: actions/checkout@v2  
        with:  
          fetch-depth: 0  # Fetch all history for all branches and tags  
  
      # Set up a temporary directory for the SSH key  
      - name: Create temporary directory  
        run: |  
          mkdir -p ~/.ssh_temp  
  
      # Write the private key to a temporary file  
      - name: Write private key to temporary file  
        env:  
          SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_REPO_SSH_PRIVATE_KEY }}  
        run: |  
          echo "$SSH_PRIVATE_KEY" > ~/.ssh_temp/id_rsa  
          chmod 600 ~/.ssh_temp/id_rsa  
  
      # Set up SSH agent and add the private key  
      - name: Set up SSH agent  
        run: |  
          eval "$(ssh-agent -s)"  
          ssh-add ~/.ssh_temp/id_rsa  
          ssh-keyscan github.com >> ~/.ssh/known_hosts  
  
      # Clone the private repository  
      - name: Clone private repository  
        run: |  
          git clone git@github.com:168xx/zdgx.git ./private-repo  
        env:  
          GIT_SSH_COMMAND: ssh -o StrictHostKeyChecking=no -i ~/.ssh_temp/id_rsa  
  
      # Copy files from private repo to live folder  
      - name: Copy files  
        run: |  
          cp -r ./zdgx/tv/* ./live/  
  
      # Stage and commit changes  
      - name: Stage changes  
        run: |  
          git add live/  
  
      - name: Commit changes  
        run: |  
          git config --local user.name 'github-actions'  
          git config --local user.email 'github-actions@github.com'  
          git commit -m "Copied files from private repository to live folder" || true  
  
      # Push changes to the current repository  
      - name: Push changes  
        uses: ad-m/github-push-action@master  
        with:  
          github_token: ${{ secrets.GITHUB_TOKEN }}  
          branch: ${{ github.ref_name }}  
  
      # Clean up temporary files  
      - name: Clean up temporary files  
        if: always()  
        run: |  
          rm -rf ~/.ssh_temp