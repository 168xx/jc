name: Copy Files from Private Repo to Live Folder  
  
on:  
  workflow_dispatch:  
  
jobs:  
  copy-and-commit:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout current repository  
        uses: actions/checkout@v2  
        with:  
          fetch-depth: 0  # Fetch all history for all branches and tags  
  
      # Set up SSH agent for private repository access  
      - name: Set up SSH keys  
        env:  
          SSH_AUTH_SOCK: /tmp/ssh-agent.sock  
        run: |  
          mkdir -p ~/.ssh  
          ssh-agent -a "$SSH_AUTH_SOCK" > /dev/null  
          ssh-add - <<< "${{ secrets.PRIVATE_REPO_SSH_PRIVATE_KEY }}"  
          ssh-keyscan github.com >> ~/.ssh/known_hosts  
  
      # Clone the private repository  
      - name: Clone private repository  
        run: |  
          git clone git@github.com:168xx/zdgx.git ./private-repo  
  
      # Copy files from private repo to live folder  
      - name: Copy files  
        run: |  
          cp -r ./private-repo/tv/*.{txt,m3u} ./live/  
  
      # Stage and commit changes  
      - name: Stage changes  
        run: |  
          git add live/  
  
      - name: Commit changes  
        run: |  
          git config --local user.name 'github-actions'  
          git config --local user.email 'github-actions@github.com'  
          git commit -m "Copied .txt and .m3u files from private repository to live folder" || true  
          # The `|| true` ensures that the step doesn't fail if there are no changes to commit  
  
      # Push changes to the current repository  
      - name: Push changes  
        uses: ad-m/github-push-action@master  
        with:  
          github_token: ${{ secrets.GITHUB_TOKEN }}  
          branch: ${{ github.ref_name }}  # Push to the branch that triggered the workflow  
  
# Note: The secrets section is not part of the workflow YAML file.  
# It should be configured in the repository settings on GitHub.  
# secrets:  
#   PRIVATE_REPO_SSH_PRIVATE_KEY:  
#     description: 'Private SSH key to clone the private repository'  
#     required: true  
#   GITHUB_TOKEN:  
#     description: 'GitHub token for pushing changes to the repository'  
#     required: true  
# (These secrets are managed via the GitHub repository's settings page, not in the YAML file.)